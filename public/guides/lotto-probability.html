<!doctype html><html lang="ko" data-theme="dark"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="로또 추첨 방식과 확률을 설명합니다."><meta name="robots" content="index,follow"><link rel="icon" href="../assets/favicon.svg"><link rel="stylesheet" href="../assets/style.css"><title>로또 번호는 어떻게 추첨될까? | LUCKY LAB</title></head><body><header class="header"><div class="container header-inner"><a class="brand" href="../index.html"><span class="logo">L</span>LUCKY LAB</a><nav class="nav"><a href="../index.html#generator">번호 생성</a><a href="../index.html#latest">당첨번호</a><a href="../index.html#guides">가이드</a></nav></div></header><main class="container page"><article class="panel article"><span class="label">LUCKY LAB</span><h1>로또 번호는 어떻게 추첨될까?</h1><p class="lead">로또 6/45는 1부터 45까지 숫자 중 서로 다른 6개를 맞히는 방식입니다.</p><h2>가능한 조합</h2><p>전체 조합은 8,145,060가지이며 한 게임의 1등 확률은 약 814만 분의 1입니다.</p><h2>번호 패턴</h2><p>연속번호나 눈에 띄는 조합도 다른 조합과 수학적 당첨 확률은 같습니다.</p><h2>생성기의 역할</h2><p>생성기는 번호 선택의 번거로움을 줄이는 도구이며 당첨 확률을 바꾸지 않습니다.</p></article></main><footer class="footer"><div class="container footer-nav"><a href="../about.html">서비스 소개</a><a href="../contact.html">문의</a><a href="../privacy.html">개인정보처리방침</a><a href="../terms.html">이용약관</a></div><div class="container copy">© 2026 LUCKY LAB.</div></footer></body></html>
